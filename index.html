<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>思维宇宙 · 声光流星版（云端同步）</title>
    <style>
        body, html { margin:0; padding:0; overflow:hidden; background:#000; font-family: sans-serif; color:white; user-select: none; }
     
        /* 寄语容器 */
        #mottoWrapper {
            position: absolute; top: 0; left: 50%; width: 400px;
            background: rgba(255,255,255,0.05); padding: 15px 15px 5px 15px;
            text-align: center; z-index: 1000; border-radius: 0 0 20px 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateX(-50%) translateY(0);
        }
        #mottoWrapper.hidden { transform: translateX(-50%) translateY(calc(-100% + 28px)); }
        #toggleMotto { cursor: pointer; padding-top: 8px; font-weight: bold; color: #aaa; transition: 0.3s; }
        #toggleMotto:hover { color: #fff; }
        
        /* 管理菜单 */
        #adminMenu { position: absolute; top: 20px; left: 20px; z-index: 1100; }
        .menuLabel { background: #111; padding: 10px 20px; border-radius: 20px; border: 1px solid #333; cursor: pointer; transition: 0.3s;}
        .menuLabel:hover { background: #222; }
        .dropdown { display: none; position: absolute; top: 45px; background: #111; min-width: 200px; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        #adminMenu:hover .dropdown { display: block; }
        .dropdown button { width: 100%; text-align: left; background: none; border: none; color: #ccc; padding: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .dropdown button:hover { color: #fff; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .dropdown button:disabled { color: #555; cursor: default; background: none; }
        .divider { height: 1px; background: #333; margin: 5px 0; }
     
        /* 弹窗样式 */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 15px; display: none; z-index: 2000; border: 1px solid #444; width: 300px; backdrop-filter: blur(10px); }
        .modal h3 { margin-top: 0; color: #fff; }
        .modal input, .modal textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 12px; box-sizing: border-box; border-radius: 8px; font-size: 14px; outline: none; }
        .modal textarea { height: 80px; resize: none; }
        .modal input:focus, .modal textarea:focus { border-color: #00f2fe; }
     
        .colorPicker { display: flex; gap: 10px; margin: 10px 0 15px 0; }
        .colorDot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; opacity: 0.5; transition: 0.2s; border: 2px solid transparent; }
        .colorDot.active { opacity: 1; border: 2px solid white; transform: scale(1.1); }
     
        .modalBtns { display: flex; justify-content: space-between; gap: 10px; }
        .modalBtns button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #333; color: white; transition: 0.2s; font-weight: bold; }
        .modalBtns button:hover { background: #444; }
        .modalBtns button.primary { background: #00f2fe; color: #000; }
        .modalBtns button.primary:hover { background: #00d2de; }
        
        /* 底部行星栏 */
        #planetBar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(250%); display: flex; gap: 15px; transition: 0.5s ease-out; z-index: 100; padding: 10px; }
        /* 增加 flex-shrink: 0 防止滚动时卡片被压缩 */
        .planetCardWrapper { position: relative; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .planetCard { background: rgba(15,15,15,0.85); border: 1px solid #333; width: 110px; padding: 18px 8px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(8px); }
        .planetCard:hover { transform: translateY(-8px); border-color: #555; background: rgba(25,25,25,0.9); }
        .planetCardTitle { font-size: 14px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
     
        /* 🌟 独立的操作按钮组 */
        .cardActions { position: absolute; top: 100%; margin-top: 10px; display: flex; gap: 6px; opacity: 0; visibility: hidden; transition: 0.2s; }
        .planetCardWrapper:hover .cardActions { opacity: 1; visibility: visible; }
        .actionBtn { background: rgba(15,15,15,0.85); border: 1px solid #444; color: #ccc; font-size: 12px; padding: 5px 10px; border-radius: 15px; cursor: pointer; transition: 0.2s; font-weight: bold; white-space: nowrap; }
        .actionBtn:hover { transform: scale(1.05); }
        .actionBtn.view:hover { background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; color: #00f2fe; }
        .actionBtn.edit:hover { background: rgba(255, 204, 0, 0.1); border-color: #ffcc00; color: #ffcc00; }
        .actionBtn.delete:hover { background: rgba(255, 77, 79, 0.1); border-color: #ff4d4f; color: #ff4d4f; }
        
        /* 内容查看器 */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(20px); }
        #viewerContent { width: 80%; max-width: 700px; text-align: center; }
        .viewerInput { background: none; border: none; border-bottom: 2px solid #222; color: #00f2fe; font-size: 32px; width: 100%; text-align: center; margin-bottom: 30px; padding-bottom: 15px; outline: none; font-weight: bold; transition: 0.3s; }
        .viewerInput:focus { border-color: #00f2fe; }
        .viewerTextarea { background: none; border: none; color: #ccc; font-size: 18px; width: 100%; height: 350px; line-height: 1.8; text-align: center; resize: none; outline: none; font-family: inherit; }
        .saveBtn { background: #00f2fe; color: #000; font-weight: bold; border: none; padding: 14px 40px; border-radius: 30px; cursor: pointer; margin-top: 30px; font-size: 16px; transition: 0.2s; box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
        .saveBtn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 254, 0.5); }
     
        /* 3D 标签 */
        .label { color: #fff; font-size: 14px; pointer-events: none; text-shadow: 0 0 8px rgba(255,255,255,0.8); background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(2px); font-weight: bold;}
        
        /* 隐藏底部滚动容器原生滚动条，但保留滑动功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/renderers/CSS2DRenderer.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="mottoWrapper">
        <div id="mottoDisplay">“每个想法，都是宇宙中的一颗星。”</div>
        <div id="toggleMotto" onclick="window.toggleMotto()">▽</div>
    </div>
    <div id="adminMenu">
        <div class="menuLabel">🌌 宇宙中心</div>
        <div class="dropdown">
            <button onclick="window.openGalaxyModal()">✨ 新建领域(恒星)</button>
            <button id="renameStarBtn" onclick="window.openRenameStarModal()" disabled>✏️ 修改领域名称</button>
            <button onclick="window.openAddChild()">➕ 发射灵感(行星/卫星)</button>
            <button id="moveModeBtn" onclick="window.toggleMoveMode()">🤚 开启全宇宙拖拽</button>
            
            <div class="divider"></div>
            <button onclick="window.loginWithGoogle()">🔑 Google 登录 (云端同步)</button>
            <button onclick="window.logout()">🚪 退出登录</button>
            <div class="divider"></div>
            <button onclick="window.resetUniverse()" style="color:#ff4d4f">🧹 清空宇宙数据</button>
        </div>
    </div>

    <div class="modal" id="galaxyModal">
        <h3>新建领域</h3>
        <input id="galaxyName" placeholder="例如：生活、工作、灵感...">
        <div class="modalBtns"><button class="primary" onclick="window.createGalaxy()">创建</button><button onclick="window.closeModals()">取消</button></div>
    </div>
    <div class="modal" id="renameStarModal">
        <h3>修改领域名称</h3>
        <input id="newStarName" placeholder="输入新的名称...">
        <div class="modalBtns"><button class="primary" onclick="window.renameStar()">保存修改</button><button onclick="window.closeModals()">取消</button></div>
    </div>
    <div class="modal" id="contentModal">
        <h3>发射新灵感行星</h3>
        <input id="planetTitle" placeholder="灵感标题...">
        <textarea id="textContent" placeholder="详细内容..."></textarea>
        <div class="settingGroup">
            <span style="font-size: 14px; color: #aaa;">色彩:</span>
            <div class="colorPicker" id="colorPickerUI">
                <div class="colorDot active" style="background:#00f2fe" data-color="#00f2fe"></div>
                <div class="colorDot" style="background:#ffcc00" data-color="#ffcc00"></div>
                <div class="colorDot" style="background:#ff4d4f" data-color="#ff4d4f"></div>
                <div class="colorDot" style="background:#7ed321" data-color="#7ed321"></div>
            </div>
        </div>
        <div class="modalBtns"><button class="primary" onclick="window.addChild()">确定发射</button><button onclick="window.closeModals()">取消</button></div>
    </div>
    <div id="planetBar"></div>
    <div id="viewer" onclick="window.closeViewer()">
        <div id="viewerContent" onclick="event.stopPropagation()">
            <input id="editTitle" class="viewerInput">
            <textarea id="editText" class="viewerTextarea"></textarea>
            <button class="saveBtn" onclick="window.saveEdit()">保存灵感修改</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBj6igbaSYUOOI2lO36WxV-XnsR4n3Y0z8",
            authDomain: "mind-universe.firebaseapp.com",
            databaseURL: "https://mind-universe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mind-universe",
            storageBucket: "mind-universe.firebasestorage.app",
            messagingSenderId: "187335173292",
            appId: "1:187335173292:web:d4680cc96cdb886ae0ab09",
            measurementId: "G-KHPQ0PL3F5"
        };
        let firebaseApp, firebaseAuth, firebaseDb, currentUser = null;

        let scene, camera, renderer, labelRenderer, controls;
        let systems = [], selectedSystem = null, selectedItem = null, currentFocused = null;
        let targetPosition = null;
        let keys = {};
        let currentPickingColor = "#00f2fe";
        let isAddingSatellite = false;
        const STORAGE_KEY = 'univ_save_data_v3';
        let isDragMode = false;
        let dragTarget = null;
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        let audioCtx = null;
        function playSpaceSound() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            const baseFreq = 250 + Math.random() * 150;
            osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.8, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        let shootingStars = [];
        const MAX_SHOOTING_STARS = 10;
        function initShootingStars() {
            for (let i = 0; i < MAX_SHOOTING_STARS; i++) createShootingStar();
        }
        function createShootingStar() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(2 * 3);
            const colors = new Float32Array(2 * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const material = new THREE.LineBasicMaterial({ vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0, linewidth: 2 });
            const line = new THREE.Line(geometry, material);
            line.userData = { active: false, speed: 0, length: 0, direction: new THREE.Vector3() };
            scene.add(line);
            shootingStars.push(line);
        }
        function activateShootingStar(star) {
            const range = 15000;
            const startX = (Math.random() - 0.5) * range * 2;
            const startY = (Math.random() - 0.2) * range;
            const startZ = (Math.random() - 0.5) * range * 2;
            const dir = new THREE.Vector3((Math.random() - 0.5) * 0.5, -1, (Math.random() - 0.5) * 0.5).normalize();
            const length = 200 + Math.random() * 300;
            const speed = 100 + Math.random() * 150;
            const positions = star.geometry.attributes.position.array;
            positions[0] = startX; positions[1] = startY; positions[2] = startZ;
            positions[3] = startX; positions[4] = startY; positions[5] = startZ;
            star.geometry.attributes.position.needsUpdate = true;
            const colors = star.geometry.attributes.color.array;
            colors[0] = 0.8; colors[1] = 0.9; colors[2] = 1.0;
            colors[3] = 0.1; colors[4] = 0.4; colors[5] = 0.8;
            star.geometry.attributes.color.needsUpdate = true;
            star.material.opacity = 0.9;
            star.userData.active = true;
            star.userData.speed = speed;
            star.userData.length = length;
            star.userData.direction.copy(dir);
            star.userData.currentLength = 0;
        }
        function updateShootingStars() {
            shootingStars.forEach(star => {
                if (!star.userData.active) {
                    if (Math.random() < 0.002) activateShootingStar(star);
                    return;
                }
                const data = star.userData;
                const positions = star.geometry.attributes.position.array;
                positions[0] += data.direction.x * data.speed;
                positions[1] += data.direction.y * data.speed;
                positions[2] += data.direction.z * data.speed;
                if (data.currentLength < data.length) {
                    data.currentLength += data.speed;
                } else {
                    positions[3] += data.direction.x * data.speed;
                    positions[4] += data.direction.y * data.speed;
                    positions[5] += data.direction.z * data.speed;
                }
                star.material.opacity -= 0.005;
                star.geometry.attributes.position.needsUpdate = true;
                if (star.material.opacity <= 0 || positions[1] < -10000) {
                    star.userData.active = false;
                    star.material.opacity = 0;
                }
            });
        }

        function initFirebase() {
            if (typeof firebase === 'undefined') { loadData(); return; }
            if (!firebase.apps.length) {
                firebaseApp = firebase.initializeApp(firebaseConfig);
                firebaseAuth = firebase.auth();
                firebaseDb = firebase.database();
            }
            firebaseAuth.onAuthStateChanged(async (user) => {
                currentUser = user;
                if (user) {
                    document.getElementById('mottoDisplay').innerHTML = `“每个想法，都是宇宙中的一颗星。” <span style="color:#00ff88; font-size:12px;">(云同步开启)</span>`;
                    await loadFromCloud();
                } else { loadData(); }
            });
        }

        window.loginWithGoogle = async () => {
            if (!firebaseAuth) return alert('Firebase 未初始化，请刷新页面');
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await firebaseAuth.signInWithPopup(provider); } catch (error) { alert('登录失败：' + error.message); }
        };
        window.logout = () => { if (firebaseAuth) firebaseAuth.signOut().then(() => location.reload()); };
        
        function clearUniverse() {
            systems.forEach(sys => {
                if (sys.star) {
                    scene.remove(sys.star);
                    if (sys.label && sys.label.element) sys.label.element.remove(); 
                }
                sys.planets.forEach(planet => {
                    scene.remove(planet);
                    if (planet.satellites) planet.satellites.forEach(sat => scene.remove(sat));
                });
            });
            systems = [];
        }

        async function loadFromCloud() {
            if (!currentUser || !firebaseDb) return;
            const ref = firebaseDb.ref(`universes/${currentUser.uid}`);
            try {
                const snapshot = await ref.once('value');
                let savedData = [];
                const val = snapshot.val();
                if (val && val.universe) {
                    savedData = val.universe;
                } else {
                    const localSaved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    if (localSaved.length > 0) {
                        savedData = localSaved;
                        await ref.set({ universe: savedData });
                        localStorage.removeItem(STORAGE_KEY);
                    }
                }
                clearUniverse();
                if (savedData.length === 0) {
                    createGalaxyLogic("欢迎使用 · 思维宇宙", new THREE.Vector3(0,0,0), [
                        { title: "这是一个灵感行星", text: "点击恒星查看，点击卡片编辑。", color: "#00f2fe", distance: 400, angle: 0, satellites: [{title: "卫星示例", text: "行星下的子灵感，可添加修改删除", color: "#ffcc00", distance: 85, angle: 1.2}] },
                        { title: "WASD 键控制移动", text: "鼠标滚轮缩放，拖拽旋转。点击行星聚焦卫星栏", color: "#ffcc00", distance: 600, angle: Math.PI / 2, satellites: [] }
                    ]);
                } else {
                    savedData.forEach(s => createGalaxyLogic(s.name, new THREE.Vector3().fromArray(s.center), s.planets || []));
                }
                if (systems.length > 0) focusOnSystem(systems[0]);
            } catch (e) { console.error(e); loadData(); }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 100000);
            camera.position.set(0, 2000, 4000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.5;
            document.body.appendChild(renderer.domElement);
            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 500;
            controls.maxDistance = 30000;
            
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<15000; i++) {
                starPos.push((Math.random()-0.5)*50000, (Math.random()-0.5)*50000, (Math.random()-0.5)*50000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ size: 15, color: 0xffffff, transparent: true, opacity: 0.7, sizeAttenuation: true });
            scene.add(new THREE.Points(starGeo, starMat));
            initShootingStars();
            document.querySelectorAll('.colorDot').forEach(dot => {
                dot.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.colorDot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    currentPickingColor = dot.getAttribute('data-color');
                };
            });
            window.addEventListener('resize', onResize);
            initFirebase();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();
            const moveSpeed = 30;
            if(keys['w']) { camera.position.addScaledVector(dir, moveSpeed); controls.target.addScaledVector(dir, moveSpeed); }
            if(keys['s']) { camera.position.addScaledVector(dir, -moveSpeed); controls.target.addScaledVector(dir, -moveSpeed); }
            if(keys['a']) { camera.position.addScaledVector(side, moveSpeed); controls.target.addScaledVector(side, moveSpeed); }
            if(keys['d']) { camera.position.addScaledVector(side, -moveSpeed); controls.target.addScaledVector(side, -moveSpeed); }
            
            if(targetPosition && selectedSystem) {
                camera.position.lerp(targetPosition, 0.05);
                controls.target.lerp(selectedSystem.center, 0.05);
                if(camera.position.distanceTo(targetPosition) < 10) targetPosition = null;
            }
            
            systems.forEach(sys => {
                sys.planets.forEach(p => {
                    p.userData.angle += 0.003 * (200 / p.userData.distance);
                    p.position.x = sys.center.x + Math.cos(p.userData.angle) * p.userData.distance;
                    p.position.z = sys.center.z + Math.sin(p.userData.angle) * p.userData.distance;
                    p.position.y = sys.center.y + Math.sin(p.userData.angle * 2) * 10;
                   
                    if (p.satellites) {
                        p.satellites.forEach(sat => {
                            sat.userData.angle += 0.008 * (100 / sat.userData.distance);
                            const center = p.position;
                            sat.position.x = center.x + Math.cos(sat.userData.angle) * sat.userData.distance;
                            sat.position.z = center.z + Math.sin(sat.userData.angle) * sat.userData.distance;
                            sat.position.y = center.y + Math.sin(sat.userData.angle * 3) * 5;
                        });
                    }
                });
            });
            updateShootingStars();
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        window.openGalaxyModal = () => document.getElementById('galaxyModal').style.display = 'block';
        window.openAddChild = () => {
            if (!currentFocused) {
                if (systems.length === 0) {
                    selectedSystem = createGalaxyLogic("默认领域", new THREE.Vector3(0,0,0));
                    currentFocused = selectedSystem;
                } else {
                    currentFocused = systems[0];
                }
            }
            isAddingSatellite = !!(currentFocused && !currentFocused.planets);
            const h3 = document.getElementById('contentModal').querySelector('h3');
            h3.innerText = isAddingSatellite ? '发射新卫星' : '发射新灵感行星';
            document.getElementById('planetTitle').value = '';
            document.getElementById('textContent').value = '';
            document.getElementById('contentModal').style.display = 'block';
        };
        
        window.toggleMoveMode = () => {
            isDragMode = !isDragMode;
            const btn = document.getElementById('moveModeBtn');
            btn.style.color = isDragMode ? '#00f2fe' : '#ccc';
            btn.innerText = isDragMode ? '✋ 关闭拖拽模式 (恢复视角旋转)' : '🤚 开启全宇宙拖拽';
            controls.enabled = !isDragMode;
        };
        
        window.openRenameStarModal = () => {
            if (!selectedSystem) return;
            document.getElementById('newStarName').value = selectedSystem.name;
            document.getElementById('renameStarModal').style.display = 'block';
        };
        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        window.closeViewer = () => document.getElementById('viewer').style.display = 'none';
        window.toggleMotto = () => {
            const w = document.getElementById('mottoWrapper');
            const btn = document.getElementById('toggleMotto');
            w.classList.toggle('hidden');
            btn.innerText = w.classList.contains('hidden') ? '△' : '▽';
        };
        
        window.createGalaxy = () => {
            const name = document.getElementById('galaxyName').value.trim() || "未知领域";
            const pos = new THREE.Vector3((Math.random()-0.5) * 10000, (Math.random()-0.5) * 3000, (Math.random()-0.5) * 10000);
            selectedSystem = createGalaxyLogic(name, pos);
            document.getElementById('galaxyName').value = '';
            window.closeModals();
            saveData();
            focusOnSystem(selectedSystem);
        };
        
        function createGalaxyLogic(name, pos, planetsData = []) {
            const star = new THREE.Mesh(new THREE.SphereGeometry(60, 16, 12), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.6 }));
            star.position.copy(pos);
            scene.add(star);
            const div = document.createElement('div');
            div.className = 'label'; div.textContent = name;
            const label = new THREE.CSS2DObject(div);
            label.position.set(0, 110, 0);
            star.add(label);
            const system = { name, star, label, center: pos, planets: [] };
            systems.push(system);
            planetsData.forEach(p => createPlanetLogic(system, p));
            updateStarAppearance(system);
            return system;
        }
        
        window.renameStar = () => {
            if (!selectedSystem) return;
            const newName = document.getElementById('newStarName').value.trim();
            if (newName && newName !== selectedSystem.name) {
                selectedSystem.name = newName;
                selectedSystem.label.element.textContent = newName;
                saveData(); window.closeModals();
            } else { window.closeModals(); }
        };
        
        function updateStarAppearance(system) {
            const count = system.planets.length;
            const scale = 1 + count * 0.25;
            system.star.scale.setScalar(scale);
            system.star.material.opacity = Math.min(0.5 + count * 0.1, 1.0);
            let targetColor = 0xffffff;
            if (count >= 1 && count <= 3) targetColor = 0x00f2fe;
            else if (count >= 4 && count <= 7) targetColor = 0x7ed321;
            else if (count >= 8 && count <= 12) targetColor = 0xffcc00;
            else if (count > 12) targetColor = 0xff4d4f;
            system.star.material.color.setHex(targetColor);
            system.label.element.style.borderColor = `#${targetColor.toString(16).padStart(6, '0')}88`;
            system.label.element.style.color = `#${targetColor.toString(16).padStart(6, '0')}`;
        }
        
        function updatePlanetAppearance(planet) {
            const count = planet.satellites.length;
            const scale = 1 + count * 0.25;
            planet.scale.setScalar(scale);
            if(planet.children.length > 0) {
                const ring = planet.children[0];
                if(ring && ring.material) {
                    ring.material.opacity = Math.min(0.3 + count * 0.15, 1.0);
                }
            }
        }
        
        function createPlanetLogic(system, pData) {
            const userData = { title: pData.title || "未命名灵感", text: pData.text || "", color: pData.color || "#00f2fe", distance: pData.distance || 300, angle: pData.angle || 0 };
            const planet = new THREE.Mesh(new THREE.SphereGeometry(20, 24, 24), new THREE.MeshBasicMaterial({ color: userData.color }));
            planet.userData = userData; planet.satellites = [];
            planet.userData.parentSystem = system;
            scene.add(planet);
            const ringGeo = new THREE.TorusGeometry(30, 1, 2, 30);
            const ringMat = new THREE.MeshBasicMaterial({ color: userData.color, transparent: true, opacity: 0.3 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            planet.add(ring);
            system.planets.push(planet);
            if (pData.satellites && Array.isArray(pData.satellites)) {
                pData.satellites.forEach(sData => createSatelliteLogic(planet, sData));
            }
            updateStarAppearance(system);
        }
        
        function createSatelliteLogic(planet, data) {
            const sat = new THREE.Mesh(new THREE.SphereGeometry(12, 20, 20), new THREE.MeshBasicMaterial({ color: data.color }));
            sat.userData = { title: data.title || "未命名卫星", text: data.text || "", color: data.color || "#00f2fe", distance: data.distance || 80, angle: data.angle || 0 };
            sat.userData.parentPlanet = planet;
            planet.satellites.push(sat);
            scene.add(sat);
            const ringGeo = new THREE.TorusGeometry(18, 0.8, 2, 30);
            const ringMat = new THREE.MeshBasicMaterial({ color: data.color, transparent: true, opacity: 0.25 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            sat.add(ring);
            updatePlanetAppearance(planet);
        }
        
        function showChildrenBar(parent) {
            const bar = document.getElementById('planetBar');
            bar.innerHTML = ''; currentFocused = parent;
            const isStarLevel = !!(parent && parent.planets);
            const children = isStarLevel ? parent.planets : (parent.satellites || []);
            selectedItem = null;
            
            if (isStarLevel) {
                selectedSystem = parent;
                document.getElementById('renameStarBtn').disabled = false;
                document.getElementById('renameStarBtn').textContent = `✏️ 修改 [${parent.name}] 名称`;
            } else {
                selectedSystem = parent.userData.parentSystem;
                document.getElementById('renameStarBtn').disabled = false;
                document.getElementById('renameStarBtn').textContent = `✏️ 修改 [${selectedSystem.name}] 名称`;
            }
            
            if (!isStarLevel) {
                const backBtn = document.createElement('div');
                backBtn.style.position = 'absolute'; backBtn.style.top = '-68px'; backBtn.style.left = '50%';
                backBtn.style.transform = 'translateX(-50%)'; backBtn.style.background = 'rgba(15,15,15,0.85)'; backBtn.style.border = '1px solid #00f2fe';
                backBtn.style.color = '#00f2fe'; backBtn.style.padding = '8px 24px'; backBtn.style.borderRadius = '30px';
                backBtn.style.cursor = 'pointer'; backBtn.style.fontSize = '14px'; backBtn.style.fontWeight = 'bold';
                backBtn.style.whiteSpace = 'nowrap'; backBtn.style.zIndex = '5';
                backBtn.innerHTML = `← 返回 ${selectedSystem.name}`;
                backBtn.onclick = (e) => { e.stopPropagation(); focusOnSystem(selectedSystem); };
                bar.appendChild(backBtn);
            }
            
            // 🌟 核心修改点：加入了一个独立承载可滚动特性的内部层 scrollArea
            const scrollArea = document.createElement('div');
            scrollArea.className = 'hide-scrollbar';
            scrollArea.style.display = 'flex';
            scrollArea.style.gap = '15px';
            scrollArea.style.maxWidth = '90vw';
            scrollArea.style.overflowX = 'auto';
            // 添加 paddingBottom 结合负 Margin，防止卡片下的悬浮按钮被 overflow 意外切掉，也不改变视觉定位
            scrollArea.style.paddingBottom = '45px'; 
            scrollArea.style.marginBottom = '-45px'; 
            
            // 🌟 加入滚轮左右滚动监听
            scrollArea.addEventListener('wheel', function(e) {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    e.stopPropagation(); // 阻止滚动冒泡，这样就不会同时缩放背后的宇宙视角
                    this.scrollLeft += e.deltaY;
                }
            }, { passive: false });

            children.forEach((child, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'planetCardWrapper';
                
                const card = document.createElement('div');
                card.className = 'planetCard'; card.style.borderTop = `4px solid ${child.userData.color}`;
                const titleDiv = document.createElement('div'); titleDiv.className = 'planetCardTitle';
                titleDiv.innerText = child.userData.title;
                card.appendChild(titleDiv);
                
                // 独立的三大功能按钮组合
                const actions = document.createElement('div');
                actions.className = 'cardActions';
                
                // 👁 查看按钮
                const viewBtn = document.createElement('div');
                viewBtn.className = 'actionBtn view';
                viewBtn.innerHTML = '👁 查看';
                viewBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (isStarLevel) {
                        playSpaceSound();
                        focusOnPlanet(child);
                    } else {
                        playSpaceSound();
                        const offset = new THREE.Vector3(0, 250, 700);
                        targetPosition = child.position.clone().add(offset);
                    }
                };

                // ✏️ 编辑按钮
                const editBtn = document.createElement('div');
                editBtn.className = 'actionBtn edit';
                editBtn.innerHTML = '✏️ 编辑';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    selectedItem = child;
                    document.getElementById('editTitle').value = child.userData.title;
                    document.getElementById('editText').value = child.userData.text;
                    document.getElementById('viewer').style.display = 'flex';
                    playSpaceSound();
                    const isPlanet = !!child.userData.parentSystem;
                    const offset = new THREE.Vector3(0, isPlanet ? 400 : 250, isPlanet ? 1200 : 700);
                    targetPosition = child.position.clone().add(offset);
                };

                // ✖ 删除按钮
                const delBtn = document.createElement('div');
                delBtn.className = 'actionBtn delete';
                delBtn.innerHTML = '✖ 删除';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    const itemName = child.userData.title;
                    if(confirm(`确定要彻底粉碎这个${isStarLevel ? '灵感' : '卫星'} [${itemName}] 吗？不可恢复。`)) {
                        scene.remove(child);
                        if(child.geometry) child.geometry.dispose(); if(child.material) child.material.dispose();
                        if (isStarLevel) {
                            parent.planets.splice(index, 1);
                            updateStarAppearance(parent);
                        } else {
                            parent.satellites.splice(index, 1);
                            updatePlanetAppearance(parent);
                        }
                        saveData();
                        showChildrenBar(parent);
                    }
                };

                actions.appendChild(viewBtn);
                actions.appendChild(editBtn);
                actions.appendChild(delBtn);
                
                wrapper.appendChild(card);
                wrapper.appendChild(actions);
                
                // 将卡片加入内部的滚动容器
                scrollArea.appendChild(wrapper);
            });
            
            // 将内部滚动容器附加到原来的容器上
            bar.appendChild(scrollArea);
            bar.style.transform = 'translateX(-50%) translateY(0)';
        }
        
        window.addChild = () => {
            const title = document.getElementById('planetTitle').value.trim() || (isAddingSatellite ? "未命名卫星" : "未命名灵感");
            const text = document.getElementById('textContent').value || "";
            let newOrbitDistance;
            if (isAddingSatellite) {
                const existingSats = currentFocused.satellites ? currentFocused.satellites.length : 0;
                newOrbitDistance = 60 + existingSats * 45;
            } else {
                let existingPlanets = 0;
                if(currentFocused && currentFocused.planets) existingPlanets = currentFocused.planets.length;
                newOrbitDistance = 250 + existingPlanets * 120;
            }

            const data = {
                title, text, color: currentPickingColor,
                distance: newOrbitDistance, 
                angle: Math.random() * Math.PI * 2
            };
            if (isAddingSatellite) {
                createSatelliteLogic(currentFocused, data);
            } else {
                if (systems.length === 0) {
                    selectedSystem = createGalaxyLogic("默认领域", new THREE.Vector3(0,0,0));
                    currentFocused = selectedSystem;
                }
                createPlanetLogic(currentFocused, data);
            }
            window.closeModals(); saveData(); showChildrenBar(currentFocused);
        };

        window.saveEdit = () => {
            if(selectedItem) {
                const newTitle = document.getElementById('editTitle').value.trim() || (selectedItem.userData.parentPlanet ? "未命名卫星" : "未命名灵感");
                selectedItem.userData.title = newTitle;
                selectedItem.userData.text = document.getElementById('editText').value;
                saveData(); showChildrenBar(currentFocused); window.closeViewer();
            }
        };
        
        window.resetUniverse = () => {
            if(confirm("💥 警告：确定要引发宇宙大爆炸，清空所有领域和灵感数据吗？不可逆！")) {
                if (currentUser && firebaseDb) {
                    firebaseDb.ref(`universes/${currentUser.uid}`).remove();
                } else {
                    localStorage.removeItem(STORAGE_KEY);
                }
                location.reload();
            }
        };
        
        function focusOnSystem(system) {
            targetPosition = system.center.clone().add(new THREE.Vector3(0, 1500, 2500));
            showChildrenBar(system);
        }
        function focusOnPlanet(planet) {
            targetPosition = planet.position.clone().add(new THREE.Vector3(0, 400, 1200));
            showChildrenBar(planet);
        }

        window.addEventListener('pointermove', e => {
            if(!isDragMode || !dragTarget) return;
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            const intersect = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, intersect);
            if(intersect) {
                if(dragTarget.type === 'system') {
                    dragTarget.item.center.copy(intersect);
                    dragTarget.item.star.position.copy(intersect);
                } else if(dragTarget.type === 'planet') {
                    const sysCenter = dragTarget.item.userData.parentSystem.center;
                    const dx = intersect.x - sysCenter.x;
                    const dz = intersect.z - sysCenter.z;
                    dragTarget.item.userData.distance = Math.sqrt(dx*dx + dz*dz);
                    dragTarget.item.userData.angle = Math.atan2(dz, dx);
                } else if(dragTarget.type === 'satellite') {
                    const planetCenter = dragTarget.item.userData.parentPlanet.position;
                    const dx = intersect.x - planetCenter.x;
                    const dz = intersect.z - planetCenter.z;
                    dragTarget.item.userData.distance = Math.sqrt(dx*dx + dz*dz);
                    dragTarget.item.userData.angle = Math.atan2(dz, dx);
                }
            }
        });
        
        window.addEventListener('pointerup', () => {
            if(dragTarget) {
                saveData();
                dragTarget = null;
            }
        });
        
        window.addEventListener('pointerdown', e => {
            if (e.target.closest('.modal') || e.target.closest('#adminMenu') || e.target.closest('#planetBar') || e.target.closest('#mottoWrapper') || e.target.closest('#viewer')) return;
         
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
         
            const allClickable = [];
            systems.forEach(s => {
                allClickable.push(s.star);
                s.planets.forEach(p => {
                    allClickable.push(p);
                    if(p.satellites) p.satellites.forEach(sat => allClickable.push(sat));
                });
            });
         
            const hits = raycaster.intersectObjects(allClickable);
   
            if(hits.length > 0) {
                const obj = hits[0].object;
                let hitSystem = null;
                let hitPlanet = null;
                let hitSatellite = null;
                for (let sys of systems) {
                    if (sys.star === obj) hitSystem = sys;
                    for (let p of sys.planets) {
                        if (p === obj) hitPlanet = p;
                        if (p.satellites) {
                            for (let s of p.satellites) {
                                if (s === obj) hitSatellite = s;
                            }
                        }
                    }
                }
                
                if(isDragMode) {
                    if(hitSystem) {
                        dragTarget = { type: 'system', item: hitSystem };
                        const normal = camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(-1).normalize();
                        dragPlane.setFromNormalAndCoplanarPoint(normal, hitSystem.center);
                    } else if(hitPlanet) {
                        dragTarget = { type: 'planet', item: hitPlanet };
                        const normal = camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(-1).normalize();
                        dragPlane.setFromNormalAndCoplanarPoint(normal, hitPlanet.position);
                    } else if(hitSatellite) {
                        dragTarget = { type: 'satellite', item: hitSatellite };
                        const normal = camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(-1).normalize();
                        dragPlane.setFromNormalAndCoplanarPoint(normal, hitSatellite.position);
                    }
                    return;
                }

                playSpaceSound();
                if (hitSystem) {
                    selectedSystem = hitSystem;
                    currentFocused = hitSystem;
                    selectedItem = null;
                    focusOnSystem(hitSystem);
                } else if (hitPlanet) {
                    selectedSystem = hitPlanet.userData.parentSystem;
                    currentFocused = hitPlanet;
                    selectedItem = null;
                    focusOnPlanet(hitPlanet);
                } else if (hitSatellite) {
                    selectedSystem = hitSatellite.userData.parentPlanet.userData.parentSystem;
                    currentFocused = hitSatellite.userData.parentPlanet;
                    selectedItem = null;
                    const offset = new THREE.Vector3(0, 250, 700);
                    targetPosition = hitSatellite.position.clone().add(offset);
                }
            } else {
                const bar = document.getElementById('planetBar');
                bar.style.transform = 'translateX(-50%) translateY(250%)';
                document.getElementById('renameStarBtn').disabled = true;
                document.getElementById('renameStarBtn').textContent = `✏️ 修改领域名称`;
                selectedSystem = null;
                currentFocused = null;
                selectedItem = null;
            }
        });
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
     
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function saveData() {
            const data = systems.map(s => ({
                name: s.name,
                center: s.center.toArray(),
                planets: s.planets.map(planet => ({
                    title: planet.userData.title,
                    text: planet.userData.text,
                    color: planet.userData.color,
                    distance: planet.userData.distance,
                    angle: planet.userData.angle,
                    satellites: planet.satellites.map(sat => ({
                        title: sat.userData.title,
                        text: sat.userData.text,
                        color: sat.userData.color,
                        distance: sat.userData.distance,
                        angle: sat.userData.angle
                    }))
                }))
            }));
            if (currentUser && firebaseDb) {
                const ref = firebaseDb.ref(`universes/${currentUser.uid}`);
                ref.set({ universe: data })
                    .then(() => console.log('💾 已同步到云端'))
                    .catch(err => console.error('同步失败', err));
            } else {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }
        }

        function loadData() {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            systems = [];
            if (saved.length === 0) {
                createGalaxyLogic("欢迎使用 · 思维宇宙", new THREE.Vector3(0,0,0), [
                    { title: "这是一个灵感行星", text: "点击恒星查看，点击卡片编辑。", color: "#00f2fe", distance: 400, angle: 0, satellites: [{title: "卫星示例", text: "行星下的子灵感，可添加修改删除", color: "#ffcc00", distance: 85, angle: 1.2}] },
                    { title: "WASD 键控制移动", text: "鼠标滚轮缩放，拖拽旋转。点击行星聚焦卫星栏", color: "#ffcc00", distance: 600, angle: Math.PI / 2, satellites: [] }
                ]);
            } else {
                saved.forEach(s => createGalaxyLogic(s.name, new THREE.Vector3().fromArray(s.center), s.planets));
            }
        }
        window.onload = init;
    </script>
</body>
</html>
